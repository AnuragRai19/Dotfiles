#SHELL
shell /usr/bin/zsh

# MODIFIER KEY
kitty_mod ctrl+shift

# BEGIN_KITTY_THEME
# Noctalia
include current-theme.conf
# END_KITTY_THEME

#FONTS
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 12

# WINDOWS
window_margin_width 5
window_border_width 2pt

# TABS
tab_bar_style powerline